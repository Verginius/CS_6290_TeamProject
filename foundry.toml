[profile.default]
src = "src"
out = "out"
libs = ["lib"]
optimizer = true
optimizer_runs = 200
via_ir = true
fs_permissions = [
	{ access = "read-write", path = "./analysis/data/raw" },
	{ access = "read-write", path = "./analysis/data/processed" },
	{ access = "read-write", path = "./.env.simulation" }
]

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
